<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta charset="UTF-8">
    <title>الإدارة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/modern-pages.css">
    <link rel="stylesheet" href="css/loaders.css">
    <style>
        /* Administration Grid */
        .administration-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .administration-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: var(--shadow-soft);
            border: 1px solid #f1f5f9;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .administration-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary) 0%, var(--secondary) 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .administration-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .administration-card:hover::before {
            opacity: 1;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 1.5rem;
            border: 2px dashed #e2e8f0;
        }

        .empty-icon {
            font-size: 4rem;
            color: var(--on-surface-variant);
            opacity: 0.3;
            margin-bottom: 1rem;
        }

        .empty-text {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--on-surface);
            margin-bottom: 1.5rem;
        }

        .empty-state .btn-modern {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.875rem 2rem;
            border-radius: 1rem;
            font-size: 0.9375rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(14, 165, 233, 0.3);
        }

        .empty-state .btn-modern:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.4);
        }

        .empty-state .btn-modern:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <!-- Global Loader -->
    <div class="loader-overlay" id="globalLoader">
        <div class="loader-container">
            <div class="loader"></div>
            <div class="loader-text">جاري التحميل...</div>
        </div>
    </div>


    <div id="sidebar-placeholder"></div>

    <div class="main-content">
        <!-- Page Header -->
        <div class="page-header">
            <div>
                <h1 class="page-title"><i class="fas fa-briefcase"></i> إدارة الشركاء والممولين</h1>
                <p class="page-subtitle">إدارة الشركاء والممولين والحسابات</p>
            </div>
            <button class="btn-modern btn-primary-modern" id="addAdministrationBtn">
                <i class="fas fa-plus"></i> إضافة شريك/ممول جديد
            </button>
        </div>

        <div class="page-content">
            <!-- Search Section -->
            <div class="search-controls" style="margin-bottom: 2rem;">
                <div class="search-box" style="display: flex; align-items: center; gap: 1rem; max-width: 600px;">
                    <input type="text" id="administrationSearch" class="form-input-modern" style="flex: 1;"
                        placeholder="ابحث عن شريك بالاسم...">
                    <button id="searchBtn" class="btn-modern btn-secondary-modern">
                        <i class="fas fa-search"></i> بحث
                    </button>
                    <button id="clearSearchBtn" class="btn-modern btn-secondary-modern">
                        <i class="fas fa-times"></i> مسح
                    </button>
                </div>
            </div>

            <!-- Administration Grid -->
            <div id="administrationContainer" class="administration-grid">
                <div class="inline-loader">جاري التحميل...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/utils/modals.js"></script>
    <script src="js/utils/crud-buttons.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/csp-fix.js"></script>
    <script>
        // Add administration button - using SweetAlert2 like contractors
        document.getElementById('addAdministrationBtn').addEventListener('click', async function () {
            const { value: name } = await Swal.fire({
                title: 'اسم الشريك/الممول',
                input: 'text',
                inputPlaceholder: 'اسم الشريك/الممول؟',
                showCancelButton: true
            });
            if (!name) return;

            const { value: type } = await Swal.fire({
                title: 'النوع',
                input: 'select',
                inputOptions: {
                    'Partner': 'شريك',
                    'Funder': 'ممول'
                },
                inputPlaceholder: 'اختر النوع',
                showCancelButton: true
            });
            if (!type) return;

            const { value: phone } = await Swal.fire({
                title: 'رقم الهاتف (اختياري)',
                input: 'text',
                inputPlaceholder: 'رقم الهاتف',
                showCancelButton: true
            });

            try {
                await fetch('http://localhost:5000/api/administration', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name.trim(),
                        type: type,
                        phone: phone?.trim() || null,
                        status: 'Active'
                    })
                });
                await Swal.fire({ icon: 'success', title: 'تم', text: 'تم إضافة الشريك/الممول' });
                window.location.reload();
            } catch (err) {
                console.error(err);
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'تعذر إضافة الشريك/الممول' });
            }
        });
    </script>
    <script src="js/sidebar.js"></script>
    <script src="js/administration.js"></script>
    <script src="js/utils/loader.js"></script>
</body>

</html>
