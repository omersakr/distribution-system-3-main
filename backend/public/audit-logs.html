<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل العمليات - نظام التوزيع</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/modern-pages.css">
    <link rel="stylesheet" href="css/loaders.css">
    <style>
        .audit-table {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            margin-bottom: 2rem;
        }

        .audit-entry {
            padding: 1.5rem;
            border-bottom: 1px solid #f8fafc;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 1.5rem;
            align-items: start;
            transition: background 0.2s;
        }

        .audit-entry:hover {
            background: #f8fafc;
        }

        .audit-entry:last-child {
            border-bottom: none;
        }

        .audit-icon {
            width: 48px;
            height: 48px;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .audit-icon.create { background: rgba(34, 197, 94, 0.1); color: #16a34a; }
        .audit-icon.update { background: rgba(251, 191, 36, 0.1); color: #d97706; }
        .audit-icon.delete { background: rgba(239, 68, 68, 0.1); color: #dc2626; }
        .audit-icon.login { background: rgba(14, 165, 233, 0.1); color: #0284c7; }
        .audit-icon.logout { background: rgba(148, 163, 184, 0.1); color: #64748b; }
        .audit-icon.blocked_attempt { background: rgba(239, 68, 68, 0.1); color: #dc2626; }

        .audit-content {
            flex: 1;
        }

        .audit-title {
            font-weight: 700;
            color: var(--on-surface);
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .audit-details {
            font-size: 0.875rem;
            color: var(--on-surface-variant);
            margin-bottom: 0.5rem;
        }

        .audit-meta {
            font-size: 0.75rem;
            color: var(--on-surface-variant);
            opacity: 0.7;
        }

        .audit-timestamp {
            font-size: 0.875rem;
            color: var(--on-surface-variant);
            text-align: left;
            white-space: nowrap;
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            .audit-entry {
                grid-template-columns: 1fr;
                gap: 1rem;
                padding: 1rem;
            }

            .audit-icon {
                width: 40px;
                height: 40px;
                font-size: 1.125rem;
            }

            .audit-title {
                font-size: 0.9375rem;
            }

            .audit-details {
                font-size: 0.8125rem;
            }

            .audit-meta {
                font-size: 0.6875rem;
            }

            .audit-timestamp {
                text-align: right;
                font-size: 0.8125rem;
            }

            /* Filter grid */
            .card-modern > div[style*="grid-template-columns"] {
                grid-template-columns: 1fr !important;
                gap: 1rem !important;
            }

            /* Buttons */
            .btn-modern {
                width: 100%;
                justify-content: center;
            }

            /* Pagination */
            .pagination {
                flex-wrap: wrap;
                gap: 0.5rem !important;
            }

            .pagination button {
                flex: 1;
                min-width: 80px;
            }
        }

        @media (max-width: 375px) {
            .audit-entry {
                padding: 0.75rem;
                gap: 0.75rem;
            }

            .audit-icon {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }

            .audit-title {
                font-size: 0.875rem;
            }

            .audit-details {
                font-size: 0.75rem;
            }

            .audit-meta {
                font-size: 0.625rem;
            }

            .audit-timestamp {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <!-- Global Loader -->
    <div class="loader-overlay" id="globalLoader">
        <div class="loader-container">
            <div class="loader"></div>
            <div class="loader-text">جاري التحميل...</div>
        </div>
    </div>


    <div id="sidebar-placeholder"></div>

    <div class="main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title"><i class="fas fa-clipboard-list"></i> سجل العمليات</h1>
                <p class="page-subtitle">تتبع جميع العمليات والأنشطة في النظام</p>
            </div>
            <button class="btn-modern btn-success-modern" onclick="exportAuditLogs()">
                <i class="fas fa-download"></i> تصدير السجلات
            </button>
        </div>

        <div class="page-content mb-8">
            <div class="card-modern">
                <h3 style="margin-bottom: 1.5rem; font-weight: 700;">تصفية السجلات</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 180px 180px; gap: 1.5rem; margin-bottom: 1.5rem;">
                    <div class="form-group-modern">
                        <label class="form-label-modern">نوع العملية</label>
                        <select id="actionFilter" class="form-input-modern" >
                            <option value="">جميع العمليات</option>
                            <option value="create">إنشاء</option>
                            <option value="update">تحديث</option>
                            <option value="delete">حذف</option>
                            <option value="login">تسجيل دخول</option>
                            <option value="logout">تسجيل خروج</option>
                            <option value="blocked_attempt">محاولة محظورة</option>
                        </select>
                    </div>
                    <div class="form-group-modern">
                        <label class="form-label-modern">نوع الكيان</label>
                        <select id="entityFilter" class="form-input-modern">
                            <option value="">جميع الكيانات</option>
                            <option value="Client">العملاء</option>
                            <option value="Crusher">الكسارات</option>
                            <option value="Contractor">المقاولين</option>
                            <option value="Employee">الموظفين</option>
                            <option value="Delivery">التسليمات</option>
                            <option value="User">المستخدمين</option>
                        </select>
                    </div>
                    <div class="form-group-modern">
                        <label class="form-label-modern">المستخدم</label>
                        <select id="userFilter" class="form-input-modern">
                            <option value="">جميع المستخدمين</option>
                        </select>
                    </div>
                    <div class="form-group-modern">
                        <label class="form-label-modern">من تاريخ</label>
                        <input type="date" id="dateFromFilter" class="form-input-modern">
                    </div>
                    <div class="form-group-modern">
                        <label class="form-label-modern">إلى تاريخ</label>
                        <input type="date" id="dateToFilter" class="form-input-modern">
                    </div>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button class="btn-modern btn-primary-modern" onclick="loadAuditLogs()">
                        <i class="fas fa-filter"></i> تطبيق التصفية
                    </button>
                    <button class="btn-modern btn-secondary-modern" onclick="clearFilters()">
                        <i class="fas fa-times"></i> مسح التصفية
                    </button>
                </div>
            </div>
        </div>

        <div class="audit-table">
            <div style="padding: 1.5rem; border-bottom: 1px solid #f8fafc; display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0; font-weight: 700;">سجل العمليات</h3>
                <div id="auditCount" style="color: var(--on-surface-variant); font-size: 0.875rem;"></div>
            </div>
            <div id="auditLogs">
                <div style="text-align: center; padding: 4rem 2rem; color: var(--on-surface-variant);">
                    جاري تحميل سجل العمليات...
                </div>
            </div>
        </div>

        <div class="pagination" id="pagination" style="display: none; justify-content: center; align-items: center; gap: 1rem; margin-top: 2rem;">
            <button id="prevPage" class="btn-modern btn-secondary-modern" onclick="changePage(-1)">السابق</button>
            <span id="pageInfo" style="color: var(--on-surface-variant); font-weight: 600;">صفحة 1 من 1</span>
            <button id="nextPage" class="btn-modern btn-secondary-modern" onclick="changePage(1)">التالي</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        const API_BASE = (function () {
            if (window.__API_BASE__) return window.__API_BASE__;
            try {
                const origin = window.location.origin;
                if (!origin || origin === 'null') return 'http://localhost:5000/api';
                return origin.replace(/\/$/, '') + '/api';
            } catch (e) {
                return 'http://localhost:5000/api';
            }
        })();

        let currentPage = 1;
        let totalPages = 1;
        const pageSize = 20;

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleString('ar-EG', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function getActionIcon(actionType) {
            const icons = {
                'create': '<i class="fas fa-plus-circle"></i>',
                'update': '<i class="fas fa-edit"></i>',
                'delete': '<i class="fas fa-trash"></i>',
                'login': '<i class="fas fa-sign-in-alt"></i>',
                'logout': '<i class="fas fa-sign-out-alt"></i>',
                'blocked_attempt': '<i class="fas fa-ban"></i>',
                'restore': '<i class="fas fa-recycle"></i>',
                'permanent_delete': '<i class="fas fa-skull-crossbones"></i>'
            };
            return icons[actionType] || '<i class="fas fa-file-alt"></i>';
        }

        function getActionText(actionType) {
            const texts = {
                'create': 'إنشاء',
                'update': 'تحديث',
                'delete': 'حذف',
                'login': 'تسجيل دخول',
                'logout': 'تسجيل خروج',
                'blocked_attempt': 'محاولة محظورة',
                'restore': 'استعادة',
                'permanent_delete': 'حذف نهائي'
            };
            return texts[actionType] || actionType;
        }

        function getEntityText(entityType) {
            const texts = {
                'Client': 'عميل',
                'Crusher': 'كسارة',
                'Contractor': 'مقاول',
                'Employee': 'موظف',
                'Delivery': 'تسليم',
                'User': 'مستخدم',
                'Administration': 'إدارة',
                'Supplier': 'مورد'
            };
            return texts[entityType] || entityType;
        }

        async function loadAuditLogs() {
            try {
                const filters = {
                    page: currentPage,
                    limit: pageSize,
                    action_type: document.getElementById('actionFilter').value,
                    entity_type: document.getElementById('entityFilter').value,
                    user_id: document.getElementById('userFilter').value,
                    date_from: document.getElementById('dateFromFilter').value,
                    date_to: document.getElementById('dateToFilter').value
                };

                // Remove empty filters
                Object.keys(filters).forEach(key => {
                    if (!filters[key]) delete filters[key];
                });

                const queryString = new URLSearchParams(filters).toString();
                const response = await authManager.makeAuthenticatedRequest(`${API_BASE}/audit-logs?${queryString}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                renderAuditLogs(data.logs || []);
                updatePagination(data.pagination || { page: 1, pages: 1, total: 0 });
                
                document.getElementById('auditCount').textContent = 
                    `إجمالي السجلات: ${data.pagination?.total || 0}`;

            } catch (error) {
                console.error('Error loading audit logs:', error);
                document.getElementById('auditLogs').innerHTML = 
                    `<div class="error">خطأ في تحميل سجل العمليات: ${error.message}</div>`;
            }
        }

        function renderAuditLogs(logs) {
            const container = document.getElementById('auditLogs');
            
            if (!logs || logs.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 4rem 2rem; color: var(--on-surface-variant);">لا توجد سجلات للعرض</div>';
                return;
            }

            container.innerHTML = logs.map(log => `
                <div class="audit-entry">
                    <div class="audit-icon ${log.action_type}">
                        ${getActionIcon(log.action_type)}
                    </div>
                    <div class="audit-content">
                        <div class="audit-title">
                            ${log.description || `${getActionText(log.action_type)} ${getEntityText(log.entity_type)}`}
                        </div>
                        <div class="audit-details">
                            المستخدم: ${log.user_role === 'manager' ? 'المدير' : 
                                      log.user_role === 'accountant' ? 'المحاسب' : 
                                      log.user_role === 'system_maintenance' ? 'صيانة النظام' : log.user_role}
                            ${log.entity_id ? ` | معرف الكيان: ${log.entity_id}` : ''}
                        </div>
                        <div class="audit-meta">
                            ${log.ip_address ? `IP: ${log.ip_address}` : ''}
                            ${log.old_values || log.new_values ? ' | تم تسجيل التفاصيل' : ''}
                        </div>
                    </div>
                    <div class="audit-timestamp">
                        ${formatDate(log.timestamp)}
                    </div>
                </div>
            `).join('');
        }

        function updatePagination(pagination) {
            currentPage = pagination.page || 1;
            totalPages = pagination.pages || 1;
            
            const paginationEl = document.getElementById('pagination');
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            const pageInfo = document.getElementById('pageInfo');
            
            if (totalPages > 1) {
                paginationEl.style.display = 'flex';
                prevBtn.disabled = currentPage <= 1;
                nextBtn.disabled = currentPage >= totalPages;
                pageInfo.textContent = `صفحة ${currentPage} من ${totalPages}`;
            } else {
                paginationEl.style.display = 'none';
            }
        }

        function changePage(direction) {
            const newPage = currentPage + direction;
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                loadAuditLogs();
            }
        }

        function clearFilters() {
            document.getElementById('actionFilter').value = '';
            document.getElementById('entityFilter').value = '';
            document.getElementById('userFilter').value = '';
            document.getElementById('dateFromFilter').value = '';
            document.getElementById('dateToFilter').value = '';
            currentPage = 1;
            loadAuditLogs();
        }

        async function exportAuditLogs() {
            try {
                const filters = {
                    action_type: document.getElementById('actionFilter').value,
                    entity_type: document.getElementById('entityFilter').value,
                    user_id: document.getElementById('userFilter').value,
                    date_from: document.getElementById('dateFromFilter').value,
                    date_to: document.getElementById('dateToFilter').value,
                    export: 'csv'
                };

                // Remove empty filters
                Object.keys(filters).forEach(key => {
                    if (!filters[key]) delete filters[key];
                });

                Swal.fire({
                    title: 'جاري التصدير...',
                    text: 'يرجى الانتظار',
                    allowOutsideClick: false,
                    didOpen: () => {
                        Swal.showLoading();
                    }
                });

                const queryString = new URLSearchParams(filters).toString();
                const response = await authManager.makeAuthenticatedRequest(`${API_BASE}/audit-logs/export?${queryString}`);
                
                if (!response.ok) {
                    throw new Error('فشل في تصدير السجلات');
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `audit-logs-${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

                Swal.fire({
                    icon: 'success',
                    title: 'تم التصدير بنجاح',
                    text: 'تم تنزيل ملف السجلات',
                    timer: 2000,
                    showConfirmButton: false
                });

            } catch (error) {
                console.error('Error exporting audit logs:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'خطأ في التصدير',
                    text: error.message,
                    confirmButtonText: 'موافق'
                });
            }
        }

        // Load data when page loads
        document.addEventListener('DOMContentLoaded', function() {
            if (authManager.checkAuth()) {
                // Check if user has permission to view audit logs
                const user = authManager.getUserInfo();
                const allowedRoles = ['manager', 'system_maintenance'];
                
                if (!user || !allowedRoles.includes(user.role)) {
                    Swal.fire({
                        icon: 'error',
                        title: 'غير مصرح',
                        text: 'ليس لديك صلاحية للوصول إلى سجل العمليات',
                        confirmButtonText: 'حسناً'
                    }).then(() => {
                        window.location.href = 'index.html';
                    });
                    return;
                }
                
                loadAuditLogs();
            }
        });
    </script>
    <script src="js/utils/loader.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/utils/modals.js"></script>
    <script src="js/utils/crud-buttons.js"></script>
</body>
</html>
