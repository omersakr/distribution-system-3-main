<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العملاء - نظام التوزيع</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/modern-pages.css">
    <link rel="stylesheet" href="css/loaders.css">
    <style>
        /* Clients Grid - Modern Design */
        .clients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .client-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: var(--shadow-soft);
            border: 1px solid #f1f5f9;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .client-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary) 0%, var(--secondary) 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .client-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .client-card:hover::before {
            opacity: 1;
        }

        .client-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #f8fafc;
        }

        .client-name {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--on-surface);
            margin: 0;
            flex: 1;
        }

        .client-actions {
            display: flex;
            gap: 0.5rem;
        }

        .client-actions .action-btn-modern {
            padding: 0.5rem 0.75rem;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 0.5rem;
            transition: all 0.2s;
            color: var(--on-surface-variant);
            font-size: 0.9375rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
        }

        .client-actions .action-btn-modern:hover {
            transform: translateY(-2px);
        }

        .client-actions .action-btn-modern.view {
            background: rgba(14, 165, 233, 0.1);
            color: var(--primary);
        }

        .client-actions .action-btn-modern.view:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(14, 165, 233, 0.3);
        }

        .client-actions .action-btn-modern.danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
        }

        .client-actions .action-btn-modern.danger:hover {
            background: var(--error);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.3);
        }

        .client-contact {
            margin-bottom: 1rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--on-surface-variant);
            padding: 0.5rem 0;
        }

        .contact-icon {
            font-size: 1.125rem;
        }

        .client-financial {
            background: #f8fafc;
            border-radius: 0.75rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .financial-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .financial-item:last-child {
            margin-bottom: 0;
        }

        .financial-label {
            font-size: 0.875rem;
            color: var(--on-surface-variant);
            font-weight: 600;
        }

        .financial-value {
            font-size: 1.125rem;
            font-weight: 700;
        }

        .client-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .stat-item {
            background: white;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #f1f5f9;
        }

        .stat-label {
            display: block;
            font-size: 0.75rem;
            color: var(--on-surface-variant);
            margin-bottom: 0.25rem;
            font-weight: 600;
        }

        .stat-value {
            display: block;
            font-size: 0.9375rem;
            font-weight: 700;
            color: var(--on-surface);
        }

        /* Search Controls */
        .search-controls {
            margin-bottom: 2rem;
        }

        .search-box {
            display: flex;
            gap: 1rem;
            max-width: 600px;
        }

        .search-box .form-input {
            flex: 1;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 1.5rem;
            border: 2px dashed #e2e8f0;
        }

        .empty-icon {
            font-size: 4rem;
            color: var(--on-surface-variant);
            opacity: 0.3;
            margin-bottom: 1rem;
        }

        .empty-text {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--on-surface);
            margin-bottom: 1.5rem;
        }

        .empty-state .btn-modern {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.875rem 2rem;
            border-radius: 1rem;
            font-size: 0.9375rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(14, 165, 233, 0.3);
        }

        .empty-state .btn-modern:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.4);
        }

        .empty-state .btn-modern:active {
            transform: translateY(0);
        }

        /* Pagination */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .pagination-info {
            font-size: 0.875rem;
            color: var(--on-surface-variant);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <!-- Global Loader -->
    <div class="loader-overlay" id="globalLoader">
        <div class="loader-container">
            <div class="loader"></div>
            <div class="loader-text">جاري التحميل...</div>
        </div>
    </div>

    <div id="sidebar-placeholder"></div>

    <div class="main-content">
        <!-- Page Header -->
        <div class="page-header">
            <div>
                <h1 class="page-title"><i class="fas fa-users"></i> إدارة العملاء</h1>
                <p class="page-subtitle">عرض وإدارة جميع العملاء والحسابات</p>
            </div>
            <button class="btn-modern btn-primary-modern" id="addClientBtn">
                <i class="fas fa-plus"></i> إضافة عميل جديد
            </button>
        </div>

        <div class="page-content">
            <!-- Search Controls -->
            <div class="search-controls">
                <div class="search-box">
                    <input type="text" id="clientSearch" class="form-input-modern"
                        placeholder="ابحث عن عميل بالاسم أو رقم الهاتف...">
                    <button id="searchBtn" class="btn-modern btn-secondary-modern">
                        <i class="fas fa-search"></i> بحث
                    </button>
                    <button id="clearSearchBtn" class="btn-modern btn-secondary-modern">
                        <i class="fas fa-times"></i> مسح
                    </button>
                </div>
            </div>

            <!-- Clients Grid -->
            <div id="clientsContainer" class="clients-grid"></div>

            <!-- Pagination -->
            <div id="paginationContainer"></div>
        </div>
    </div>

    <!-- Add Client Modal -->
    <div id="addClientModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>إضافة عميل جديد</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div id="addClientMessage"></div>
            <form id="addClientForm">
                <div class="form-group-modern">
                    <label class="form-label-modern" for="clientName">اسم العميل *</label>
                    <input type="text" class="form-input-modern" id="clientName" name="name" required
                        autocomplete="name" placeholder="أدخل اسم العميل">
                </div>

                <div class="form-group-modern">
                    <label class="form-label-modern" for="clientPhone">رقم الهاتف</label>
                    <input type="tel" class="form-input-modern" id="clientPhone" name="phone" placeholder="اختياري"
                        autocomplete="tel">
                </div>

                <div class="form-group-modern">
                    <label class="form-label-modern" for="openingBalance">الرصيد الافتتاحي (جنيه)</label>
                    <input type="number" class="form-input-modern" id="openingBalance" name="opening_balance"
                        step="0.01" placeholder="0.00" autocomplete="off">
                    <small
                        style="display: block; margin-top: 0.5rem; font-size: 0.75rem; color: var(--on-surface-variant);">
                        موجب = العميل يدين لنا، سالب = نحن ندين للعميل
                    </small>
                </div>

                <div class="modal-actions"
                    style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
                    <button type="button" class="btn-modern btn-secondary-modern modal-close">إلغاء</button>
                    <button type="submit" class="btn-modern btn-primary-modern">إضافة العميل</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/utils/modals.js"></script>
    <script src="js/utils/crud-buttons.js"></script>
    <script src="js/utils/formatters.js"></script>
    <script src="js/utils/validation.js"></script>
    <script src="js/utils/dom.js"></script>
    <script src="js/utils/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/csp-fix.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/clients.js"></script>
    <script src="js/utils/loader.js"></script>
</body>

</html>
