<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العملاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/modern-theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        /* Fix modal centering in RTL */
        .modal-content {
            margin: 0 auto;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/loaders.css">
</head>

<body>
    <!-- Global Loader -->
    <div class="loader-overlay" id="globalLoader">
        <div class="loader-container">
            <div class="loader"></div>
            <div class="loader-text">جاري التحميل...</div>
        </div>
    </div>


    <div id="sidebar-placeholder"></div>

    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">إدارة العملاء</h1>
            <button class="btn btn-primary" id="addClientBtn">
                <i class="fas fa-plus"></i> إضافة عميل جديد
            </button>
        </div>

        <div class="content-section">
            <div class="search-controls">
                <div class="search-box">
                    <input type="text" id="clientSearch" class="form-input" placeholder="ابحث عن عميل...">
                    <button id="searchBtn" class="btn btn-secondary"><i class="fas fa-search"></i> بحث</button>
                    <button id="clearSearchBtn" class="btn btn-secondary"><i class="fas fa-times"></i> مسح</button>
                </div>
            </div>

            <div id="clientsContainer" class="clients-grid"></div>
            <div id="paginationContainer"></div>
        </div>
    </div>

    <!-- Add Client Modal -->
    <div id="addClientModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">إضافة عميل جديد</div>
            <div id="addClientMessage"></div>
            <form id="addClientForm">
                <div class="form-group">
                    <label class="form-label" for="clientName">اسم العميل *</label>
                    <input type="text" class="form-input" id="clientName" name="name" required autocomplete="name">
                </div>

                <div class="form-group">
                    <label class="form-label" for="clientPhone">رقم الهاتف</label>
                    <input type="tel" class="form-input" id="clientPhone" name="phone" placeholder="اختياري" autocomplete="tel">
                </div>

                <div class="form-group">
                    <label class="form-label" for="openingBalance">الرصيد الافتتاحي</label>
                    <input type="number" class="form-input" id="openingBalance" name="opening_balance" step="0.01" placeholder="0.00" autocomplete="off">
                    <small class="form-help">موجب = العميل يدين لنا، سالب = نحن ندين للعميل</small>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary modal-close">إلغاء</button>
                    <button type="submit" class="btn btn-primary">إضافة العميل</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/utils/formatters.js"></script>
    <script src="js/utils/validation.js"></script>
    <script src="js/utils/dom.js"></script>
    <script src="js/utils/api.js"></script>
    <script src="js/utils/modals.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/csp-fix.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/clients.js"></script>
    <script src="js/utils/loader.js"></script>
</body>

</html>
