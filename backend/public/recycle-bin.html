<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة المحذوفات - نظام التوزيع</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/modern-pages.css">
    <link rel="stylesheet" href="css/loaders.css">
    <style>
        .recycle-table {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
        }

        .recycle-entry {
            padding: 1.5rem;
            border-bottom: 1px solid #f8fafc;
            display: grid;
            grid-template-columns: auto auto 1fr auto;
            gap: 1.5rem;
            align-items: center;
            transition: background 0.2s;
        }

        .recycle-entry:hover {
            background: #f8fafc;
        }

        .recycle-entry:last-child {
            border-bottom: none;
        }

        .recycle-icon {
            width: 48px;
            height: 48px;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            flex-shrink: 0;
        }

        .recycle-content {
            flex: 1;
        }

        .recycle-title {
            font-weight: 700;
            color: var(--on-surface);
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .recycle-details {
            font-size: 0.875rem;
            color: var(--on-surface-variant);
            margin-bottom: 0.5rem;
        }

        .recycle-meta {
            font-size: 0.75rem;
            color: var(--on-surface-variant);
            opacity: 0.7;
        }

        .recycle-actions {
            display: flex;
            gap: 0.75rem;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <!-- Global Loader -->
    <div class="loader-overlay" id="globalLoader">
        <div class="loader-container">
            <div class="loader"></div>
            <div class="loader-text">جاري التحميل...</div>
        </div>
    </div>


    <div id="sidebar-placeholder"></div>

    <div class="main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title"><i class="fas fa-trash-restore"></i> سلة المحذوفات</h1>
                <p class="page-subtitle">استعادة أو حذف العناصر المحذوفة نهائياً</p>
            </div>
        </div>

        <div class="page-content mb-8">
            <div class="card-modern">
                <h3 style="margin-bottom: 1.5rem; font-weight: 700;">تصفية العناصر المحذوفة</h3>
                <div style="display: grid; grid-template-columns: 1fr 180px 180px; gap: 1.5rem; margin-bottom: 1.5rem;">
                    <div class="form-group-modern">
                        <label class="form-label-modern">نوع العنصر</label>
                        <select id="entityFilter" class="form-input-modern">
                            <option value="">جميع الأنواع</option>
                            <option value="clients">العملاء</option>
                            <option value="crushers">الكسارات</option>
                            <option value="contractors">المقاولين</option>
                            <option value="employees">الموظفين</option>
                            <option value="deliveries">التسليمات</option>
                            <option value="administration">الإدارة</option>
                            <option value="suppliers">الموردين</option>
                        </select>
                    </div>
                    <div class="form-group-modern">
                        <label class="form-label-modern">من تاريخ الحذف</label>
                        <input type="date" id="dateFromFilter" class="form-input-modern">
                    </div>
                    <div class="form-group-modern">
                        <label class="form-label-modern">إلى تاريخ الحذف</label>
                        <input type="date" id="dateToFilter" class="form-input-modern">
                    </div>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button class="btn-modern btn-primary-modern" onclick="loadDeletedItems()">
                        <i class="fas fa-filter"></i> تطبيق التصفية
                    </button>
                    <button class="btn-modern btn-secondary-modern" onclick="clearFilters()">
                        <i class="fas fa-times"></i> مسح التصفية
                    </button>
                </div>
            </div>
        </div>

        <div class="recycle-table">
            <div style="padding: 1.5rem; border-bottom: 1px solid #f8fafc; display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0; font-weight: 700;">العناصر المحذوفة</h3>
                <div id="itemCount" style="color: var(--on-surface-variant); font-size: 0.875rem;"></div>
            </div>
            
            <div id="bulkActions" style="display: none; padding: 1.5rem; border-bottom: 1px solid #f8fafc; gap: 1rem;" data-role="manager">
                <button class="btn-modern btn-success-modern" onclick="bulkRestore()">
                    <i class="fas fa-undo"></i> استعادة المحدد
                </button>
                <button class="btn-modern btn-danger-modern" onclick="bulkDelete()">
                    <i class="fas fa-trash"></i> حذف نهائي للمحدد
                </button>
                <span id="selectedCount" style="color: var(--on-surface-variant); font-size: 0.875rem;"></span>
            </div>

            <div id="deletedItems">
                <div style="text-align: center; padding: 4rem 2rem; color: var(--on-surface-variant);">
                    جاري تحميل العناصر المحذوفة...
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        const API_BASE = (function () {
            if (window.__API_BASE__) return window.__API_BASE__;
            try {
                const origin = window.location.origin;
                if (!origin || origin === 'null') return 'http://localhost:5000/api';
                return origin.replace(/\/$/, '') + '/api';
            } catch (e) {
                return 'http://localhost:5000/api';
            }
        })();

        let selectedItems = new Set();

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleString('ar-EG', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function getEntityIcon(entityType) {
            const icons = {
                'clients': '<i class="fas fa-users"></i>',
                'crushers': '<i class="fas fa-industry"></i>',
                'contractors': '<i class="fas fa-truck"></i>',
                'employees': '<i class="fas fa-user"></i>',
                'deliveries': '<i class="fas fa-box"></i>',
                'administration': '<i class="fas fa-building"></i>',
                'suppliers': '<i class="fas fa-store"></i>'
            };
            return icons[entityType] || '<i class="fas fa-file"></i>';
        }

        function getEntityText(entityType) {
            const texts = {
                'clients': 'عميل',
                'crushers': 'كسارة',
                'contractors': 'مقاول',
                'employees': 'موظف',
                'deliveries': 'تسليم',
                'administration': 'إدارة',
                'suppliers': 'مورد'
            };
            return texts[entityType] || entityType;
        }

        async function loadDeletedItems() {
            try {
                const filters = {
                    entity_type: document.getElementById('entityFilter').value,
                    date_from: document.getElementById('dateFromFilter').value,
                    date_to: document.getElementById('dateToFilter').value
                };

                // Remove empty filters
                Object.keys(filters).forEach(key => {
                    if (!filters[key]) delete filters[key];
                });

                const queryString = new URLSearchParams(filters).toString();
                const response = await authManager.makeAuthenticatedRequest(`${API_BASE}/recycle-bin?${queryString}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                renderDeletedItems(data.items || []);
                
                document.getElementById('itemCount').textContent = 
                    `إجمالي العناصر المحذوفة: ${data.items?.length || 0}`;

            } catch (error) {
                console.error('Error loading deleted items:', error);
                document.getElementById('deletedItems').innerHTML = 
                    `<div class="error">خطأ في تحميل العناصر المحذوفة: ${error.message}</div>`;
            }
        }

        function renderDeletedItems(items) {
            const container = document.getElementById('deletedItems');
            
            if (!items || items.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 4rem 2rem;">
                        <div style="font-size: 4rem; color: var(--on-surface-variant); opacity: 0.3; margin-bottom: 1rem;">
                            <i class="fas fa-trash-alt"></i>
                        </div>
                        <h3 style="font-size: 1.125rem; font-weight: 600; color: var(--on-surface); margin-bottom: 0.5rem;">
                            سلة المحذوفات فارغة
                        </h3>
                        <p style="color: var(--on-surface-variant);">لا توجد عناصر محذوفة للعرض</p>
                    </div>
                `;
                return;
            }

            const canRestore = authManager.hasRole('manager');
            
            container.innerHTML = items.map(item => `
                <div class="recycle-entry">
                    ${canRestore ? `
                        <input type="checkbox" 
                               onchange="toggleSelection('${item.entity_type}', '${item.id}')"
                               style="width: 20px; height: 20px; cursor: pointer;">
                    ` : ''}
                    <div class="recycle-icon">
                        ${getEntityIcon(item.entity_type)}
                    </div>
                    <div class="recycle-content">
                        <div class="recycle-title">
                            ${getEntityText(item.entity_type)}: ${item.name || item.title || `معرف ${item.id}`}
                        </div>
                        <div class="recycle-details">
                            ${item.description || 'لا توجد تفاصيل إضافية'}
                        </div>
                        <div class="recycle-meta">
                            تم الحذف في: ${formatDate(item.deleted_at)}
                        </div>
                    </div>
                    <div class="recycle-actions">
                        ${canRestore ? `
                            <button class="btn-modern btn-success-modern" style="font-size: 0.875rem; padding: 0.5rem 1rem;" onclick="restoreItem('${item.entity_type}', '${item.id}')">
                                <i class="fas fa-undo"></i> استعادة
                            </button>
                            <button class="btn-modern btn-danger-modern" style="font-size: 0.875rem; padding: 0.5rem 1rem;" onclick="permanentDelete('${item.entity_type}', '${item.id}')">
                                <i class="fas fa-trash"></i> حذف نهائي
                            </button>
                        ` : ''}
                    </div>
                </div>
            `).join('');

            // Show bulk actions if user can restore
            if (canRestore && items.length > 0) {
                document.getElementById('bulkActions').style.display = 'flex';
            }
        }

        function toggleSelection(entityType, id) {
            const key = `${entityType}:${id}`;
            if (selectedItems.has(key)) {
                selectedItems.delete(key);
            } else {
                selectedItems.add(key);
            }
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const count = selectedItems.size;
            const countEl = document.getElementById('selectedCount');
            if (countEl) {
                countEl.textContent = count > 0 ? `محدد: ${count} عنصر` : '';
            }
        }

        async function restoreItem(entityType, id) {
            const result = await Swal.fire({
                title: 'استعادة العنصر',
                text: 'هل أنت متأكد من استعادة هذا العنصر؟',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'نعم، استعادة',
                cancelButtonText: 'إلغاء',
                confirmButtonColor: '#10b981',
                cancelButtonColor: '#6b7280'
            });

            if (!result.isConfirmed) {
                return;
            }

            try {
                const response = await authManager.makeAuthenticatedRequest(
                    `${API_BASE}/recycle-bin/${entityType}/${id}/restore`, 
                    { method: 'POST' }
                );
                
                if (!response.ok) {
                    throw new Error('فشل في استعادة العنصر');
                }

                await Swal.fire({
                    title: 'تم الاستعادة',
                    text: 'تم استعادة العنصر بنجاح',
                    icon: 'success',
                    confirmButtonText: 'حسناً',
                    confirmButtonColor: '#10b981'
                });
                loadDeletedItems();

            } catch (error) {
                console.error('Error restoring item:', error);
                await Swal.fire({
                    title: 'خطأ',
                    text: 'خطأ في استعادة العنصر: ' + error.message,
                    icon: 'error',
                    confirmButtonText: 'حسناً',
                    confirmButtonColor: '#ef4444'
                });
            }
        }

        async function permanentDelete(entityType, id) {
            const result = await Swal.fire({
                title: 'تحذير',
                text: 'سيتم حذف هذا العنصر نهائياً ولن يمكن استعادته. هل أنت متأكد؟',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'نعم، حذف نهائي',
                cancelButtonText: 'إلغاء',
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#6b7280'
            });

            if (!result.isConfirmed) {
                return;
            }

            try {
                const response = await authManager.makeAuthenticatedRequest(
                    `${API_BASE}/recycle-bin/${entityType}/${id}/permanent`, 
                    { method: 'DELETE' }
                );
                
                if (!response.ok) {
                    throw new Error('فشل في الحذف النهائي');
                }

                await Swal.fire({
                    title: 'تم الحذف',
                    text: 'تم الحذف النهائي بنجاح',
                    icon: 'success',
                    confirmButtonText: 'حسناً',
                    confirmButtonColor: '#10b981'
                });
                loadDeletedItems();

            } catch (error) {
                console.error('Error permanently deleting item:', error);
                await Swal.fire({
                    title: 'خطأ',
                    text: 'خطأ في الحذف النهائي: ' + error.message,
                    icon: 'error',
                    confirmButtonText: 'حسناً',
                    confirmButtonColor: '#ef4444'
                });
            }
        }

        async function bulkRestore() {
            if (selectedItems.size === 0) {
                await Swal.fire({
                    title: 'تنبيه',
                    text: 'يرجى تحديد عناصر للاستعادة',
                    icon: 'info',
                    confirmButtonText: 'حسناً',
                    confirmButtonColor: '#3b82f6'
                });
                return;
            }

            const result = await Swal.fire({
                title: 'استعادة متعددة',
                text: `هل أنت متأكد من استعادة ${selectedItems.size} عنصر؟`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'نعم، استعادة الكل',
                cancelButtonText: 'إلغاء',
                confirmButtonColor: '#10b981',
                cancelButtonColor: '#6b7280'
            });

            if (!result.isConfirmed) {
                return;
            }

            try {
                const items = Array.from(selectedItems).map(key => {
                    const [entityType, id] = key.split(':');
                    return { entityType, id };
                });

                const response = await authManager.makeAuthenticatedRequest(
                    `${API_BASE}/recycle-bin/bulk-restore`, 
                    { 
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ items })
                    }
                );
                
                if (!response.ok) {
                    throw new Error('فشل في الاستعادة المجمعة');
                }

                await Swal.fire({
                    title: 'تم الاستعادة',
                    text: 'تم استعادة العناصر بنجاح',
                    icon: 'success',
                    confirmButtonText: 'حسناً',
                    confirmButtonColor: '#10b981'
                });
                selectedItems.clear();
                loadDeletedItems();

            } catch (error) {
                console.error('Error bulk restoring:', error);
                await Swal.fire({
                    title: 'خطأ',
                    text: 'خطأ في الاستعادة المجمعة: ' + error.message,
                    icon: 'error',
                    confirmButtonText: 'حسناً',
                    confirmButtonColor: '#ef4444'
                });
            }
        }

        async function bulkDelete() {
            if (selectedItems.size === 0) {
                await Swal.fire({
                    title: 'تنبيه',
                    text: 'يرجى تحديد عناصر للحذف',
                    icon: 'info',
                    confirmButtonText: 'حسناً',
                    confirmButtonColor: '#3b82f6'
                });
                return;
            }

            const result = await Swal.fire({
                title: 'تحذير',
                text: `سيتم حذف ${selectedItems.size} عنصر نهائياً ولن يمكن استعادتها. هل أنت متأكد؟`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'نعم، حذف نهائي',
                cancelButtonText: 'إلغاء',
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#6b7280'
            });

            if (!result.isConfirmed) {
                return;
            }

            try {
                const items = Array.from(selectedItems).map(key => {
                    const [entityType, id] = key.split(':');
                    return { entityType, id };
                });

                const response = await authManager.makeAuthenticatedRequest(
                    `${API_BASE}/recycle-bin/bulk-delete`, 
                    { 
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ items })
                    }
                );
                
                if (!response.ok) {
                    throw new Error('فشل في الحذف النهائي المجمع');
                }

                await Swal.fire({
                    title: 'تم الحذف',
                    text: 'تم الحذف النهائي للعناصر بنجاح',
                    icon: 'success',
                    confirmButtonText: 'حسناً',
                    confirmButtonColor: '#10b981'
                });
                selectedItems.clear();
                loadDeletedItems();

            } catch (error) {
                console.error('Error bulk deleting:', error);
                await Swal.fire({
                    title: 'خطأ',
                    text: 'خطأ في الحذف النهائي المجمع: ' + error.message,
                    icon: 'error',
                    confirmButtonText: 'حسناً',
                    confirmButtonColor: '#ef4444'
                });
            }
        }

        function clearFilters() {
            document.getElementById('entityFilter').value = '';
            document.getElementById('dateFromFilter').value = '';
            document.getElementById('dateToFilter').value = '';
            loadDeletedItems();
        }

        // Load data when page loads
        document.addEventListener('DOMContentLoaded', function() {
            if (authManager.checkAuth()) {
                loadDeletedItems();
            }
        });
    </script>
    <script src="js/utils/loader.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/utils/modals.js"></script>
    <script src="js/utils/crud-buttons.js"></script>
</body>
</html>
