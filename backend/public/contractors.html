<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta charset="UTF-8">
    <title>المقاولين</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/modern-pages.css">
    <link rel="stylesheet" href="css/loaders.css">
    <style>
        /* Contractors Grid */
        .contractors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .contractor-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: var(--shadow-soft);
            border: 1px solid #f1f5f9;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .contractor-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary) 0%, var(--secondary) 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .contractor-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .contractor-card:hover::before {
            opacity: 1;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 1.5rem;
            border: 2px dashed #e2e8f0;
        }

        .empty-icon {
            font-size: 4rem;
            color: var(--on-surface-variant);
            opacity: 0.3;
            margin-bottom: 1rem;
        }

        .empty-text {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--on-surface);
            margin-bottom: 1.5rem;
        }

        .empty-state .btn-modern {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.875rem 2rem;
            border-radius: 1rem;
            font-size: 0.9375rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(14, 165, 233, 0.3);
        }

        .empty-state .btn-modern:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.4);
        }

        .empty-state .btn-modern:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <!-- Global Loader -->
    <div class="loader-overlay" id="globalLoader">
        <div class="loader-container">
            <div class="loader"></div>
            <div class="loader-text">جاري التحميل...</div>
        </div>
    </div>


    <div id="sidebar-placeholder"></div>

    <div class="main-content">
        <!-- Page Header -->
        <div class="page-header">
            <div>
                <h1 class="page-title"><i class="fas fa-truck"></i> إدارة مقاولو العجل</h1>
                <p class="page-subtitle">إدارة المقاولين والمشاوير والمستحقات</p>
            </div>
            <button class="btn-modern btn-primary-modern" id="addContractorBtn">
                <i class="fas fa-plus"></i> إضافة مقاول جديد
            </button>
        </div>

        <div class="page-content">
            <!-- Search Section -->
            <div class="search-controls" style="margin-bottom: 2rem;">
                <div class="search-box" style="display: flex; align-items: center; gap: 1rem; max-width: 600px;">
                    <input type="text" id="contractorSearch" class="form-input-modern" style="flex: 1;"
                        placeholder="ابحث عن مقاول بالاسم...">
                    <button id="searchBtn" class="btn-modern btn-secondary-modern">
                        <i class="fas fa-search"></i> بحث
                    </button>
                    <button id="clearSearchBtn" class="btn-modern btn-secondary-modern">
                        <i class="fas fa-times"></i> مسح
                    </button>
                </div>
            </div>

            <!-- Contractors Grid -->
            <div id="contractorsContainer" class="contractors-grid">
                <div class="inline-loader">جاري التحميل...</div>
            </div>
        </div>
    </div>

    <!-- Add Contractor Modal -->
    <div id="addContractorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>إضافة مقاول جديد</h2>
                <button class="modal-close">&times;</button>
            </div>
            <form id="addContractorForm">
                <div class="form-group-modern">
                    <label class="form-label-modern" for="contractorName">اسم المقاول *</label>
                    <input type="text" class="form-input-modern" id="contractorName" name="name" required maxlength="255" autocomplete="name">
                </div>

                <div class="form-group-modern">
                    <label class="form-label-modern">الأرصدة الافتتاحية (حسب العميل)</label>
                    <div id="contractorOpeningBalancesContainer" style="display: flex; flex-direction: column; gap: 1rem;">
                        <!-- Opening balance rows will be added here dynamically -->
                    </div>
                    <button type="button" class="btn-modern btn-secondary-modern" id="addContractorOpeningBalanceBtn" style="margin-top: 1rem;">
                        <i class="fas fa-plus"></i> إضافة رصيد افتتاحي
                    </button>
                    <small style="display: block; margin-top: 0.5rem; font-size: 0.75rem; color: var(--on-surface-variant);">
                        الرصيد الافتتاحي لكل عميل (موجب = نحن مدينون لهم)
                    </small>
                </div>

                <div id="addContractorMessage"></div>
                <div class="modal-actions" style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
                    <button type="button" class="btn-modern btn-secondary-modern modal-close">إلغاء</button>
                    <button type="submit" class="btn-modern btn-primary-modern">حفظ</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/utils/formatters.js"></script>
    <script src="js/utils/validation.js"></script>
    <script src="js/utils/dom.js"></script>
    <script src="js/utils/api.js"></script>
    <script src="js/utils/modals.js"></script>
    <script src="js/utils/crud-buttons.js"></script>
    <script src="js/utils/form-protection.js"></script>
    <script src="js/utils/form-submit.js"></script>
    <script src="js/utils/auto-protect-forms.js"></script>
    <script src="js/csp-fix.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/contractors.js"></script>
    <script src="js/utils/loader.js"></script>
</body>

</html>
